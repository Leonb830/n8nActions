name: Start n8n

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: n8n-container
  cancel-in-progress: true

jobs:
  start-n8n:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: changeme-please

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start n8n Docker container
        run: |
          docker run -d \
            --name n8n \
            -p 5678:5678 \
            -e N8N_BASIC_AUTH_ACTIVE=true \
            -e N8N_BASIC_AUTH_USER="${N8N_BASIC_AUTH_USER}" \
            -e N8N_BASIC_AUTH_PASSWORD="${N8N_BASIC_AUTH_PASSWORD}" \
            -e N8N_HOST=localhost \
            -e N8N_PORT=5678 \
            docker.n8n.io/n8nio/n8n:latest

      - name: Wait for n8n
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:5678 >/dev/null; then
              echo "n8n is running"
              exit 0
            fi

            echo "Waiting for n8n..."
            sleep 2
          done

          echo "n8n did not start in time"
          docker logs n8n
          exit 1

      - name: Install Cloudflare tunnel
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -O cloudflared

          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/cloudflared

      - name: Start temporary tunnel
        run: |
          nohup cloudflared tunnel --url http://localhost:5678 > cloudflared.log 2>&1 &

          for i in {1..60}; do
            N8N_URL=$(grep -o 'https://[-a-zA-Z0-9.]*\.trycloudflare.com' cloudflared.log | head -n 1 || true)

            if [ -n "$N8N_URL" ]; then
              echo "N8N_URL=$N8N_URL" >> "$GITHUB_ENV"
              echo "n8n tunnel URL: $N8N_URL"
              exit 0
            fi

            echo "Waiting for tunnel URL..."
            sleep 2
          done

          echo "Cloudflare tunnel did not start in time"
          cat cloudflared.log
          exit 1

      - name: Publish n8n URL to repository
        run: |
          CREATED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EXPIRES_AT=$(date -u -d "+55 minutes" +"%Y-%m-%dT%H:%M:%SZ")

          cat > n8n-url.json <<EOF
          {
            "status": "running",
            "url": "${N8N_URL}",
            "created_at": "${CREATED_AT}",
            "expires_at": "${EXPIRES_AT}"
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add n8n-url.json
          git commit -m "Publish temporary n8n URL" || echo "No changes to commit"
          git push

      - name: Keep n8n alive
        run: |
          echo "n8n is available at: ${N8N_URL}"
          echo "The runner will stay alive for about 55 minutes."
          sleep 3300

      - name: Mark n8n as stopped
        if: always()
        run: |
          STOPPED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > n8n-url.json <<EOF
          {
            "status": "stopped",
            "url": null,
            "created_at": "${STOPPED_AT}",
            "expires_at": null
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add n8n-url.json
          git commit -m "Mark temporary n8n instance as stopped" || echo "No changes to commit"
          git push
